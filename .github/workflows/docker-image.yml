name: Check Docker Hub Tags, Build and Push
on:
  schedule:
    - cron: '0 2,14 * * *'  # Runs daily at 2 AM and 2 PM
  workflow_dispatch:  # Allows manual triggering
jobs:
  discover-branches:
    runs-on: ubuntu-latest
    outputs:
      branch-matrix: ${{ steps.set-matrix.outputs.branches }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all branches
    - name: Discover branches
      id: set-matrix
      run: |
        # Get all remote branches, exclude common non-version branches
        BRANCHES=$(git branch -r | grep -v 'HEAD' | sed 's/.*origin\///' | grep -v '^gh-pages$' | grep -v '^main$' | sort -u)
        # Build JSON array for matrix
        JSON="["
        FIRST=true
        for branch in $BRANCHES; do
          if [ "$FIRST" = true ]; then
            FIRST=false
          else
            JSON+=","
          fi
          JSON+="\"$branch\""
        done
        JSON+="]"
        echo "branches=$JSON" >> $GITHUB_OUTPUT
        echo "Discovered branches: $JSON"

  check-tags:
    needs: discover-branches
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.check-outputs.outputs.build-matrix }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all branches
    - name: Check Docker Hub for tag updates
      id: check-outputs
      run: |
        # Fetch the latest tags from Docker Hub
        curl -s "https://hub.docker.com/v2/namespaces/library/repositories/nextcloud/tags?page_size=100" -o tags.json

        # Define 24 hours ago
        DATE_24_HOURS_AGO=$(date -u -d '24 hours ago' +"%Y-%m-%dT%H:%M:%SZ")

        # Get the branch matrix from previous job
        BRANCHES='${{ needs.discover-branches.outputs.branch-matrix }}'

        # Build build matrix
        BUILD_MATRIX="{"
        FIRST=true

        for branch in $(echo "$BRANCHES" | jq -r '.[]'); do
          # Extract version from Dockerfile in each branch
          VERSION=$(git show "origin/$branch:Dockerfile" 2>/dev/null | grep '^FROM nextcloud:' | sed 's/FROM nextcloud:\([0-9]*\).*/\1/')

          if [ -z "$VERSION" ]; then
            continue
          fi

          TAG="${VERSION}-apache"

          # Get tag last update time
          LAST_UPDATE=$(jq -r ".results[] | select(.name==\"$TAG\") | .last_updated" tags.json)

          if [ -z "$LAST_UPDATE" ]; then
            continue
          fi

          # Remove microseconds and compare
          LAST_UPDATE_CLEAN=$(echo "$LAST_UPDATE" | sed 's/\.[0-9]*Z/Z/')

          if [[ "$(date -d "$LAST_UPDATE_CLEAN" +%s)" -gt "$(date -d "$DATE_24_HOURS_AGO" +%s)" ]]; then
            SHOULD_BUILD="true"
          else
            SHOULD_BUILD="false"
          fi

          if [ "$FIRST" = true ]; then
            FIRST=false
          else
            BUILD_MATRIX+=","
          fi
          BUILD_MATRIX+="\"$branch\":{\"version\":\"$VERSION\",\"should_build\":$SHOULD_BUILD}"
        done

        BUILD_MATRIX+="}"
        echo "build-matrix=$BUILD_MATRIX" >> $GITHUB_OUTPUT
        echo "Build matrix: $BUILD_MATRIX"

  build:
    needs: [discover-branches, check-tags]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.discover-branches.outputs.branch-matrix) }}
    if: >-
      fromJson(needs.check-tags.outputs.build-matrix)[matrix.branch].should_build == true
    steps:
    - name: Checkout branch
      uses: actions/checkout@v4
      with:
        ref: ${{ matrix.branch }}
    - name: Get version from Dockerfile
      id: get-version
      run: |
        VERSION=$(grep '^FROM nextcloud:' Dockerfile | sed 's/FROM nextcloud:\([0-9]*\).*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and Push Docker Image
      run: |
        VERSION=${{ steps.get-version.outputs.version }}
        docker buildx build --push -t cardonaje/nextcloud:${VERSION}-apache .

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
