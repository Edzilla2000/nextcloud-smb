name: Check Docker Hub Tags, Build and Push
on:
  schedule:
    - cron: '0 2,14 * * *'  # Runs daily at 2 AM and 2 PM
  workflow_dispatch:  # Allows manual triggering
jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.check.outputs.matrix }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all branches
    - name: Check Docker Hub for tag updates
      id: check
      run: |
        # Fetch the latest tags from Docker Hub
        curl -s "https://hub.docker.com/v2/namespaces/library/repositories/nextcloud/tags?page_size=100" -o tags.json

        # Define 24 hours ago
        DATE_24_HOURS_AGO=$(date -u -d '24 hours ago' +"%Y-%m-%dT%H:%M:%SZ")

        # Get all remote branches
        BRANCHES=$(git branch -r | grep -v 'HEAD' | sed 's/.*origin\///' | grep -v '^gh-pages$' | grep -v '^main$' | sort -u)

        # Build JSON array of branches that need building
        MATRIX="["
        FIRST=true

        for branch in $BRANCHES; do
          # Extract version from Dockerfile in each branch
          VERSION=$(git show "origin/$branch:Dockerfile" 2>/dev/null | grep '^FROM nextcloud:' | sed 's/FROM nextcloud:\([0-9]*\).*/\1/')

          if [ -z "$VERSION" ]; then
            continue
          fi

          TAG="${VERSION}-apache"

          # Get tag last update time
          LAST_UPDATE=$(jq -r ".results[] | select(.name==\"$TAG\") | .last_updated" tags.json)

          if [ -z "$LAST_UPDATE" ] || [ "$LAST_UPDATE" = "null" ]; then
            continue
          fi

          # Remove microseconds and compare
          LAST_UPDATE_CLEAN=$(echo "$LAST_UPDATE" | sed 's/\.[0-9]*Z/Z/')

          if [[ "$(date -d "$LAST_UPDATE_CLEAN" +%s)" -gt "$(date -d "$DATE_24_HOURS_AGO" +%s)" ]]; then
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              MATRIX+=","
            fi
            MATRIX+="{\"branch\":\"$branch\",\"version\":\"$VERSION\"}"
          fi
        done

        MATRIX+="]"
        echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
        echo "Branches to build: $MATRIX"

  build:
    needs: check-updates
    if: needs.check-updates.outputs.build-matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.check-updates.outputs.build-matrix) }}
    steps:
    - name: Checkout branch
      uses: actions/checkout@v4
      with:
        ref: ${{ matrix.branch }}
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and Push Docker Image
      run: |
        docker buildx build --push -t cardonaje/nextcloud:${{ matrix.version }}-apache .
    - name: Tag as latest (master branch only)
      if: matrix.branch == 'master'
      run: |
        docker buildx build --push -t cardonaje/nextcloud:latest .

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
